name: Bump formula

on:
  # Trigger from the main canonry repo's publish workflow via repository_dispatch
  # (event_type: "canonry-published", client_payload: { version: "2.4.7" }).
  repository_dispatch:
    types: [canonry-published]
  # Manual fallback — pass the version explicitly.
  workflow_dispatch:
    inputs:
      version:
        description: "canonry version to bump to (e.g. 2.4.7)"
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          if [ -z "$VERSION" ]; then
            echo "::error::No version provided"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Bump formula
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TARBALL_URL="https://registry.npmjs.org/@ainyc/canonry/-/canonry-${VERSION}.tgz"

          # Wait for the tarball to be available on the npm CDN — the
          # publish workflow can dispatch this before npm has propagated.
          for i in 1 2 3 4 5 6; do
            if curl -fsSL -o /tmp/canonry.tgz "$TARBALL_URL"; then
              break
            fi
            echo "tarball not ready (attempt $i), sleeping 10s..."
            sleep 10
          done
          test -s /tmp/canonry.tgz

          SHA256=$(sha256sum /tmp/canonry.tgz | awk '{print $1}')
          echo "version=$VERSION sha256=$SHA256"

          # Update url + sha256 in place. Homebrew derives the version from
          # the URL filename, so no separate version line is required.
          # `|` as the sed delimiter avoids escaping `/` in the URL.
          sed -i "s|^  url \".*\"|  url \"${TARBALL_URL}\"|" Formula/canonry.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" Formula/canonry.rb

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if git diff --quiet Formula/canonry.rb; then
            echo "Formula already at $VERSION — nothing to do"
            exit 0
          fi

          git add Formula/canonry.rb
          git commit -m "canonry $VERSION"
          git push origin HEAD:main
